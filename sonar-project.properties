# SonarLint / SonarQube Configuration
# Suppress false positives for React Three Fiber (unknown JSX properties mapping to Three.js)
sonar.issue.ignore.multicriteria=r3f_props,r3f_props_ts,math_random

# Ignore S6759 (Unknown property) since React Three Fiber uses dynamic intrinsics
sonar.issue.ignore.multicriteria.r3f_props.ruleKey=javascript:S6759
sonar.issue.ignore.multicriteria.r3f_props.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.r3f_props_ts.ruleKey=typescript:S6759
sonar.issue.ignore.multicriteria.r3f_props_ts.resourceKey=**/*.tsx

# Ignore S2245 (Using pseudorandom number generator is security-sensitive) since this is a game not crypto
sonar.issue.ignore.multicriteria.math_random.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.math_random.resourceKey=**/*.ts*

